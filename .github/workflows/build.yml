name: Build NodeTunnel Plugin

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check server compiles
        run: cargo check -p nt_server

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows x64
        run: |
          cd crates/client
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Copy DLL to addons
        run: |
          New-Item -ItemType Directory -Force -Path addons/nodetunnel/bin
          Copy-Item target/x86_64-pc-windows-msvc/release/nt_client.dll addons/nodetunnel/bin/nodetunnel.dll

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: addons/nodetunnel/bin/nodetunnel.dll

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build Linux x64
        run: |
          cd crates/client
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Copy SO to addons
        run: |
          mkdir -p addons/nodetunnel/bin
          cp target/x86_64-unknown-linux-gnu/release/libnt_client.so addons/nodetunnel/bin/libnodetunnel.so

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: addons/nodetunnel/bin/libnodetunnel.so

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build macOS x64
        run: |
          cd crates/client
          cargo build --release --target x86_64-apple-darwin

      - name: Build macOS ARM64
        run: |
          cd crates/client
          cargo build --release --target aarch64-apple-darwin

      - name: Copy dylibs to addons
        run: |
          mkdir -p addons/nodetunnel/bin
          cp target/x86_64-apple-darwin/release/libnt_client.dylib addons/nodetunnel/bin/libnodetunnel.macos.dylib
          cp target/aarch64-apple-darwin/release/libnt_client.dylib addons/nodetunnel/bin/libnodetunnel.macos.arm64.dylib

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: addons/nodetunnel/bin/*.dylib

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
          # Re-enable armv7 here when godot-ffi supports 32-bit Android again.

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          NDK_VERSION="26.1.10909125"
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Android ARM64
        run: |
          cd crates/client
          cargo ndk -t arm64-v8a build --release

      # TODO: Re-enable once godot-ffi supports 32-bit Android. Currently this
      # fails with compile-time GDExtension ABI size assertions on armv7.
      # - name: Build Android ARMv7
      #   run: |
      #     cd crates/client
      #     cargo ndk -t armeabi-v7a build --release

      - name: Build Android x86_64
        run: |
          cd crates/client
          cargo ndk -t x86_64 build --release

      - name: Copy Android libs to addons
        run: |
          mkdir -p addons/nodetunnel/bin/android/arm64-v8a
          mkdir -p addons/nodetunnel/bin/android/x86_64
          # mkdir -p addons/nodetunnel/bin/android/armeabi-v7a
          cp target/aarch64-linux-android/release/libnt_client.so addons/nodetunnel/bin/android/arm64-v8a/libnodetunnel.so
          cp target/x86_64-linux-android/release/libnt_client.so addons/nodetunnel/bin/android/x86_64/libnodetunnel.so
          # cp target/armv7-linux-androideabi/release/libnt_client.so addons/nodetunnel/bin/android/armeabi-v7a/libnodetunnel.so

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-all
          path: addons/nodetunnel/bin/android/

  package-plugin:
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble plugin
        run: |
          mkdir -p addons/nodetunnel/bin
          cp artifacts/windows-x64/nodetunnel.dll addons/nodetunnel/bin/
          cp artifacts/linux-x64/libnodetunnel.so addons/nodetunnel/bin/
          cp artifacts/macos-universal/*.dylib addons/nodetunnel/bin/
          cp -r artifacts/android-all/* addons/nodetunnel/bin/

      - name: Create plugin archive
        run: |
          zip -r nodetunnel-plugin.zip addons/

      - name: Upload complete plugin
        uses: actions/upload-artifact@v4
        with:
          name: nodetunnel-complete
          path: nodetunnel-plugin.zip

      - name: Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: nodetunnel-plugin.zip
